# Release — automated via semantic-release (Conventional Commits).
#
# Zero-touch: every push to `main` runs semantic-release; a releasable change
# (feat → minor, fix → patch; a BREAKING change stays 0.x → minor per
# .releaserc.json releaseRules) computes the next version, updates package.json
# + CHANGELOG.md, publishes, tags, and creates the GitHub release. No releasable
# commits → no-op. Preview with the workflow_dispatch dry-run.
#
# Publish: semantic-release owns versioning only; the actual publish is the
# proven OIDC `pnpm publish` (exec plugin) — @semantic-release/npm runs
# npmPublish:false so no NPM token is needed; provenance via id-token:write.
# One-time trusted-publisher registration (package @chainvue/peculium-wallet,
# repo chainvue/peculium-wallet, workflow release.yml) applies.
#
# CUTOVER (one-time): push the baseline tag `v0.1.0` BEFORE the first main push
# so version computation continues from there (else it jumps to 1.0.0).
#
# Security: this job holds id-token:write (npm publish rights). Actions are
# SHA-pinned (tag-hijack defense); token scope is least-privilege (contents +
# id-token; github-plugin comments/labels disabled in .releaserc.json). `main`
# must let GITHUB_TOKEN push the release commit + tag.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: compute the next version + notes, but do not publish or tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # semantic-release pushes the release commit + tag
      id-token: write # OIDC token for npm trusted publishing (provenance)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history + tags: semantic-release needs them

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Release
        run: >-
          pnpm exec semantic-release
          ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          # This job is npm-only; without this, setup-node sees the workspace
          # packageManager field and demands a pnpm binary for its cache.
          package-manager-cache: false

      # Validate whatever is currently latest on the registry (new version if
      # this run published; the existing latest on a no-op — harmless recheck).
      - name: Resolve latest published version
        id: v
        run: echo "version=$(npm view @chainvue/peculium-wallet version)" >> "$GITHUB_OUTPUT"

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if npm view "@chainvue/peculium-wallet@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
              echo "available"; exit 0
            fi
            echo "waiting ($i)"; sleep 5
          done
          echo "version never appeared on registry"; exit 1

      - name: Fresh-machine acceptance — install + init + doctor against the public node
        env:
          PECULIUM_KEYSTORE_PASSPHRASE: smoke-passphrase-ci-only
        run: |
          # Install into a throwaway project and run the CLI bin directly.
          # NOT `npx <pkg> <cmd>`: npx guesses the bin name (the bin is
          # `peculium`, not the unscoped package name `peculium-wallet`) and
          # its install cache is flaky — both produce spurious
          # "peculium: not found" (exit 127) failures.
          mkdir -p /tmp/pecu-smoke-app && cd /tmp/pecu-smoke-app
          npm init -y >/dev/null
          npm install "@chainvue/peculium-wallet@${{ steps.v.outputs.version }}"
          BIN=./node_modules/.bin/peculium
          "$BIN" init --starter --dir /tmp/peculium-smoke
          # doctor exit code = number of failed checks; a fresh wallet warns
          # (0 balance) but must not FAIL any check.
          "$BIN" doctor --dir /tmp/peculium-smoke
