# Release — publish @chainvue/peculium-wallet to npm via OIDC trusted publishing.
# Same trigger model as chainvue/verus-rpc: MANUAL workflow_dispatch on
# main; the release event is the version-bump commit.
#
# One-time prerequisite: trusted-publisher registration on npmjs.com for
# @chainvue/peculium-wallet (repo chainvue/peculium-wallet, workflow release.yml).
#
# The smoke job is the PUBLISH-CHECKLIST "fresh-machine acceptance": npx
# init --starter + doctor against the public testnet node, from the
# registry artifact — no local Verus software anywhere.
name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build, test and pack, but do not publish"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Full gate (prepublishOnly)
        run: pnpm run build && pnpm run typecheck && pnpm run lint && pnpm run test

      - name: Publish
        run: >-
          pnpm publish --no-git-checks
          ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          package-manager-cache: false

      - name: Resolve version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if npm view "@chainvue/peculium-wallet@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
              echo "available"; exit 0
            fi
            echo "waiting ($i)"; sleep 5
          done
          echo "version never appeared on registry"; exit 1

      - name: Fresh-machine acceptance — npx init + doctor against the public node
        env:
          PECULIUM_KEYSTORE_PASSPHRASE: smoke-passphrase-ci-only
          PECULIUM_DIR: /tmp/peculium-smoke
        run: |
          npx -y "@chainvue/peculium-wallet@${{ steps.v.outputs.version }}" init --starter --dir /tmp/peculium-smoke
          # doctor exit code = number of failed checks; a fresh wallet warns
          # (0 balance) but must not FAIL any check.
          npx -y "@chainvue/peculium-wallet@${{ steps.v.outputs.version }}" doctor --dir /tmp/peculium-smoke
